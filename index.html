<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Peri intake</title>
<style>
  :root { --amber:#b45f06; --ink:#1a1a1a; --line:#e6e6e6; --muted:#8a8a8a; }
  * { box-sizing:border-box; }
  body { font:16px/1.5 -apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;
         color:var(--ink); margin:0; padding:20px; max-width:640px; margin:0 auto; }
  h1 { font-size:20px; font-weight:600; margin:0 0 4px; }
  p.sub { color:var(--muted); margin:0 0 20px; font-size:14px; }
  label { font-size:13px; color:var(--muted); display:block; margin:14px 0 4px; }
  textarea, input { width:100%; padding:12px; border:1px solid var(--line);
                    border-radius:10px; font-size:16px; font-family:inherit; }
  textarea { height:110px; resize:vertical; }
  button { width:100%; margin-top:16px; padding:14px; border:0; border-radius:10px;
           background:var(--ink); color:#fff; font-size:16px; font-weight:500; }
  button:disabled { opacity:.5; }
  details { margin-top:18px; }
  summary { color:var(--muted); font-size:13px; cursor:pointer; }
  .row { display:flex; align-items:center; gap:10px; padding:10px 0;
         border-bottom:1px solid var(--line); font-size:14px; }
  .name { font-weight:600; }
  .amber { color:var(--amber); }
  .muted { color:var(--muted); }
  #results { margin-top:24px; }
  button.secondary { background:var(--amber); }
  .hint { color:var(--muted); font-size:13px; margin-top:8px; }
  .report { margin-top:12px; font-size:15px; line-height:1.6; }
  .report h1 { font-size:20px; } .report h2 { font-size:16px; margin-top:22px; }
  .report table { border-collapse:collapse; width:100%; font-size:13px; margin:8px 0; }
  .report th, .report td { border:1px solid var(--line); padding:6px 8px; text-align:left; vertical-align:top; }
  .report code { background:#f4f4f4; padding:1px 4px; border-radius:4px; }
  .report ul { padding-left:20px; }
</style>
</head>
<body>
  <h1>Peri intake</h1>
  <p class="sub">Drop TikTok video links, one per line. Each becomes a creator with views, a category, and a stored transcript.</p>

  <label>TikTok video URLs</label>
  <textarea id="urls" placeholder="https://www.tiktok.com/@creator/video/123..."></textarea>

  <label>Followers for this creator (optional)</label>
  <input id="followers" type="number" inputmode="numeric" placeholder="e.g. 48000">

  <button id="go" onclick="run()">Add to Peri</button>

  <details>
    <summary>Settings</summary>
    <label>Function URL</label>
    <input id="endpoint" placeholder="https://YOUR-PROJECT.supabase.co/functions/v1/ingest">
    <label>Ingest secret</label>
    <input id="secret" type="password" placeholder="the INGEST_SECRET you set">
  </details>

  <div id="results"></div>

  <hr style="margin:28px 0 0;border:0;border-top:1px solid var(--line)">
  <button id="reportBtn" class="secondary" onclick="runReport()">Run the report</button>
  <p class="hint" id="reportHint">Summarizes every transcript collected so far with Claude. Takes ~30s.</p>
  <div id="report" class="report"></div>

<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<script>
  const $ = (id) => document.getElementById(id);
  // Remember settings on this device so you do not retype them on the phone.
  for (const k of ["endpoint", "secret"]) {
    $(k).value = localStorage.getItem("peri_" + k) || "";
    $(k).addEventListener("input", () => localStorage.setItem("peri_" + k, $(k).value));
  }

  async function run() {
    const endpoint = $("endpoint").value.trim();
    const secret = $("secret").value.trim();
    if (!endpoint) { alert("Set the Function URL under Settings first."); return; }
    const urls = $("urls").value.split("\n").map(s => s.trim()).filter(Boolean);
    const followers = $("followers").value ? Number($("followers").value) : undefined;
    if (!urls.length) return;

    $("go").disabled = true;
    for (const url of urls) {
      const row = addRow(url, "working...");
      try {
        const r = await fetch(endpoint, {
          method: "POST",
          headers: { "content-type": "application/json", "x-ingest-secret": secret },
          body: JSON.stringify({ url, followers }),
        });
        const d = await r.json();
        if (d.status === "ok") {
          row.innerHTML = `<span class="name">@${d.username}</span>
            <span class="amber">${d.category ?? ""}</span>
            <span class="muted">${(d.views ?? "").toLocaleString?.() ?? d.views ?? ""} views · ${d.transcript}</span>`;
        } else {
          row.innerHTML = `<span class="muted">${url}</span> <span class="amber">${d.error || "error"}</span>`;
        }
      } catch (e) {
        row.innerHTML = `<span class="muted">${url}</span> <span class="amber">${e}</span>`;
      }
    }
    $("urls").value = "";
    $("followers").value = "";
    $("go").disabled = false;
  }

  async function runReport() {
    const endpoint = $("endpoint").value.trim();
    const secret = $("secret").value.trim();
    if (!endpoint) { alert("Set the Function URL under Settings first."); return; }
    const analyzeUrl = endpoint.replace(/\/ingest\/?$/, "/analyze");
    const btn = $("reportBtn"), out = $("report"), hint = $("reportHint");
    btn.disabled = true;
    out.innerHTML = "";
    hint.textContent = "Running… reading every transcript and writing the summary (~30s).";
    try {
      const r = await fetch(analyzeUrl, {
        method: "POST",
        headers: { "content-type": "application/json", "x-ingest-secret": secret },
        body: "{}",
      });
      const d = await r.json();
      if (d.ok && d.report) {
        hint.textContent = `Based on ${d.transcript_count} transcript(s) from ${d.creator_count} creator(s).`;
        out.innerHTML = window.marked
          ? marked.parse(d.report)
          : "<pre>" + d.report.replace(/[&<>]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c])) + "</pre>";
      } else {
        hint.textContent = "";
        out.textContent = d.error || "Something went wrong.";
      }
    } catch (e) {
      hint.textContent = "";
      out.textContent = String(e);
    }
    btn.disabled = false;
  }

  function addRow(url, status) {
    const div = document.createElement("div");
    div.className = "row";
    div.innerHTML = `<span class="muted">${url}</span> <span>${status}</span>`;
    $("results").prepend(div);
    return div;
  }
</script>
</body>
</html>
